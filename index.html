<!DOCTYPE html>
<html>
<head>
<title>Course Registration</title>
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">

<style>
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #e6ecf3, #ffffff);
    margin:0;
}

/* Header Section */
.header{
    text-align:center;
    padding:20px;
}

.logo{
    width:220px;
    margin-bottom:10px;
}

.tagline{
    font-size:16px;
    color:#444;
    font-weight:500;
}

/* Form Container */
.container{
    width:420px;
    margin:30px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

/* Form Styling */
label{
    font-size:14px;
    font-weight:600;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0 15px 0;
    border-radius:6px;
    border:1px solid #ccc;
    transition:0.3s;
}

input:focus{
    border-color:#0073e6;
    outline:none;
    box-shadow:0 0 5px rgba(0,115,230,0.3);
}

/* Button */
button{
    width:100%;
    padding:12px;
    background: linear-gradient(to right, #0073e6, #005bb5);
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background: linear-gradient(to right, #005bb5, #003f8a);
}
</style>

</head>
