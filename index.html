<!DOCTYPE html>
<html>
<head>
<title>Course Registration</title>
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">

<style>
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #e6ecf3, #ffffff);
    margin:0;
}

.header{
    text-align:center;
    padding:20px;
}

.logo{
    width:220px;
    margin-bottom:10px;
}

.tagline{
    font-size:16px;
    color:#444;
    font-weight:500;
}

.container{
    width:420px;
    margin:30px auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

label{
    font-size:14px;
    font-weight:600;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin:6px 0 15px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background: linear-gradient(to right, #0073e6, #005bb5);
    color:white;
    border:none;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="header">

<img src="https://upload.wikimedia.org/wikipedia/en/3/3b/Kongu_Engineering_College_logo.png" class="logo">

<div class="tagline">
Empowering students through placement-focused courses and career opportunities
</div>

</div>

<div class="container">

<h2>Course Registration</h2>

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead" method="POST">

<input type="hidden" name="oid" value="00DgL00000K24ap">
<input type="hidden" name="retURL" value="https://deepsikha2909.github.io/Placement/thankyou.html">
<input type="hidden" name="company" value="Student">
<input type="hidden" name="encoding" value="UTF-8">

<label>First Name</label>
<input name="first_name" type="text" required>

<label>Last Name</label>
<input name="last_name" type="text" required>

<label>Email</label>
<input name="email" type="email" required>

<label>Phone</label>
<input name="phone" type="text">

<label>Roll Number</label>
<input name="00NgL00003K981J" type="text">

<label>Department Name</label>
<input name="00NgL00003K99rp" type="text">

<label>Course Name</label>
<input name="00NgL00003K9APh" type="text">

<label>Registration Date</label>
<input name="00NgL00003K99ob" type="date">

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
